<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sue-Talk | 韓文口說練習</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --bg-color: #f9f9fb;
            --chat-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 16px;
        }
        .ai {
            align-self: flex-start;
            background-color: #e1e1e1;
            color: #333;
            border-bottom-left-radius: 2px;
        }
        .user {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 2px;
        }
        .controls {
            padding: 20px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #ddd;
        }
        #mic-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary-color);
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            transition: transform 0.2s;
        }
        #mic-btn:active { transform: scale(0.9); }
        #mic-btn.recording { background-color: #ff7675; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 118, 117, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0); }
        }
        .status-text { font-size: 12px; color: #888; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<header>Daily Sue-Talk: 本週重點 을/를 & 에서</header>

<div id="chat-container">
    <div class="message ai">안녕하세요! 수 씨, 보통 집에서 뭐 해요? (請回答你在家做的事)</div>
</div>

<div class="controls-wrapper">
    <div class="status-text" id="status">點擊麥克風開始說話</div>
    <div class="controls">
        <button id="mic-btn">🎤</button>
    </div>
</div>

<script>
    const micBtn = document.getElementById('mic-btn');
    const chatContainer = document.getElementById('chat-container');
    const statusText = document.getElementById('status');

    // 1. 初始化語音辨識 (STT)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR'; // 設定為韓文
    recognition.interimResults = false;

    // 2. 初始化語音合成 (TTS)
    const synth = window.speechSynthesis;

    micBtn.addEventListener('click', () => {
        recognition.start();
        micBtn.classList.add('recording');
        statusText.innerText = "正在聽你說話...";
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        addMessage(transcript, 'user');
        processResponse(transcript);
        micBtn.classList.remove('recording');
        statusText.innerText = "點擊麥克風開始說話";
    };

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        
        if (sender === 'ai') {
            speak(text);
        }
    }

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ko-KR';
        synth.speak(utter);
    }

    // 3. 模擬 AI 老師邏輯 (之後可串接 API)
    function processResponse(input) {
        let feedback = "";
        
        // 簡單判斷這週的語法重點：을/를
        if (!input.includes('을') && !input.includes('를')) {
            feedback = "（老師提醒：試著加上受詞助詞 '을' 或 '를' 會更棒喔！）";
        }

        setTimeout(() => {
            if (input.includes('커피') || input.includes('마셔')) {
                addMessage("오, 집에서 커피를 마셔요? 저도 커피를 좋아해요! " + feedback, 'ai');
            } else {
                addMessage("좋아요! " + input + " (這是一個很棒的練習) " + feedback, 'ai');
            }
        }, 1000);
    }
</script>

</body>
</html>
