<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sue-Talk | 韓文口說練習</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --bg-color: #f9f9fb;
            --chat-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 16px;
        }
        .ai {
            align-self: flex-start;
            background-color: #e1e1e1;
            color: #333;
            border-bottom-left-radius: 2px;
        }
        .user {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 2px;
        }
        .controls {
            padding: 20px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #ddd;
        }
        #mic-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary-color);
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            transition: transform 0.2s;
        }
        #mic-btn:active { transform: scale(0.9); }
        #mic-btn.recording { background-color: #ff7675; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 118, 117, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0); }
        }
        .status-text { font-size: 12px; color: #888; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<header>Daily Sue-Talk: 本週重點 을/를 & 에서</header>

<div id="chat-container">
    <div class="message ai">안녕하세요! 수 씨, 보통 집에서 뭐 해요? (請回答你在家做的事)</div>
</div>

<div class="controls-wrapper">
    <div class="status-text" id="status">點擊麥克風開始說話</div>
    <div class="controls">
        <button id="mic-btn">🎤</button>
    </div>
</div>

<script>
    const micBtn = document.getElementById('mic-btn');
    const chatContainer = document.getElementById('chat-container');
    const statusText = document.getElementById('status');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        statusText.innerText = "❌ 你的瀏覽器不支援語音辨識，請換 Safari 或 Chrome";
        statusText.style.color = "red";
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR';
    recognition.interimResults = false;
    const synth = window.speechSynthesis;

    micBtn.addEventListener('click', () => {
        try {
            recognition.start();
            micBtn.classList.add('recording');
            statusText.innerText = "🎤 正在聽... 請說韓文";
        } catch (e) {
            statusText.innerText = "❌ 啟動失敗：" + e.message;
        }
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        addMessage(transcript, 'user');
        processResponse(transcript);
        micBtn.classList.remove('recording');
        statusText.innerText = "✅ 辨識成功，點擊再次說話";
    };

    recognition.onerror = (event) => {
        micBtn.classList.remove('recording');
        statusText.innerText = "❌ 錯誤: " + event.error + " (請檢查麥克風權限)";
        console.error(event.error);
    };

    // ... (其餘 addMessage, speak, processResponse 保持不變) ...
</script>

</body>
</html>
